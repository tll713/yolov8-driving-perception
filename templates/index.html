<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自动驾驶目标检测与风险提示系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>自动驾驶感知系统</h1>
                    <span class="logo-sub">YOLOv8 Object Detection & Risk Assessment</span>
                </div>
            </div>
            <div class="header-status">
                <span class="status-dot"></span>
                <span class="status-text">系统就绪</span>
            </div>
        </div>
    </header>

    <main class="main">
        <section class="controls-panel">
            <div class="controls-row">
                <div class="upload-zone" id="uploadZone">
                    <div class="upload-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                    </div>
                    <div class="upload-info">
                        <span class="upload-title">拖放文件或点击上传</span>
                        <span class="upload-hint">支持 JPG / PNG / MP4 / AVI</span>
                    </div>
                    <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.mp4,.avi">
                    <label for="fileInput" class="btn btn-outline">选择文件</label>
                    <span id="fileName" class="file-name">未选择文件</span>
                </div>

                <div class="param-group">
                    <label class="param-label">
                        置信度阈值
                        <span class="param-value" id="thresholdValue">0.50</span>
                    </label>
                    <input type="range" id="threshold" min="0.1" max="0.9" step="0.05" value="0.5" class="slider">
                </div>

                <div class="action-group">
                    <button id="detectBtn" class="btn btn-primary" disabled>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        开始检测
                    </button>
                    <button id="clearBtn" class="btn btn-ghost">清空结果</button>
                </div>
            </div>
        </section>

        <section class="display-area">
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-dot"></span>
                    <h3>原始画面</h3>
                </div>
                <div class="panel-body" id="originalContainer">
                    <div class="placeholder">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                        <p>请上传图片或视频</p>
                    </div>
                </div>
            </div>
            <div class="panel panel-highlight">
                <div class="panel-header">
                    <span class="panel-dot dot-accent"></span>
                    <h3>检测结果</h3>
                    <span class="panel-badge" id="detectBadge" style="display:none;">NEW</span>
                </div>
                <div class="panel-body" id="resultContainer">
                    <div class="placeholder">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
                            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <p>检测后将在此显示</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                </div>
                <div class="stat-content">
                    <span class="stat-label">检测目标数</span>
                    <span class="stat-number" id="totalCount">0</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon icon-risk">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                </div>
                <div class="stat-content">
                    <span class="stat-label">整体风险</span>
                    <span class="stat-number risk-low" id="overallRisk">—</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon icon-time">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </div>
                <div class="stat-content">
                    <span class="stat-label">推理耗时</span>
                    <span class="stat-number" id="inferenceTime">— ms</span>
                </div>
            </div>
            <div class="stat-card stat-card-wide">
                <div class="stat-icon icon-class">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                </div>
                <div class="stat-content">
                    <span class="stat-label">各类别计数</span>
                    <div class="class-tags" id="classCounts">—</div>
                </div>
            </div>
        </section>

        <section class="history-panel">
            <div class="history-header">
                <h3>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    检测历史
                </h3>
                <button id="downloadLogBtn" class="btn btn-ghost btn-sm">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    下载日志
                </button>
            </div>
            <ul id="historyList">
                <li class="history-empty">暂无记录</li>
            </ul>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
