<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自动驾驶目标检测与风险提示系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div id="app">
        <div class="bg-grid"></div>
        <div class="bg-glow bg-glow-1"></div>
        <div class="bg-glow bg-glow-2"></div>

        <app-header
            :health-status="healthStatus"
            :model-info="modelInfo"
            :current-user="currentUser"
        ></app-header>

        <main class="main">
            <control-panel
                :has-file="!!currentFile"
                :is-detecting="isDetecting"
                @file-selected="onFileSelected"
                @detect="onDetect"
                @clear="onClear"
            ></control-panel>

            <display-area
                :file-preview-url="filePreviewUrl"
                :file-type="fileType"
                :detections="detections"
                :detection-timeline="detectionTimeline"
                :is-detecting="isDetecting"
                :show-badge="showBadge"
                :result-video-url="resultVideoUrl"
            ></display-area>

            <stats-grid
                :confidence="confidence"
                :total-count="stats.totalCount"
                :overall-risk="stats.overallRisk"
                :risk-class="stats.riskClass"
                :inference-time="stats.inferenceTime"
                :class-counts="stats.classCounts"
                :risk-counts="stats.riskCounts"
                :max-risk-score="stats.maxRiskScore"
                :inference-mode="stats.inferenceMode"
                :inference-size="stats.inferenceSize"
                :refined="stats.refined"
            ></stats-grid>

            <risk-analysis-panel
                :detections="detections"
            ></risk-analysis-panel>

            <safety-advice-panel
                :advice="safetyAdvice"
            ></safety-advice-panel>

            <scene-insight-panel
                :summary="sceneSummary"
                :trace="decisionTrace"
            ></scene-insight-panel>

            <demo-script-panel
                :script="demoScript"
            ></demo-script-panel>

            <simulation-panel
                :presets="simulationPresets"
                :scenario="simulationScenario"
                :speed="simulationSpeed"
                :duration="simulationDuration"
                :result="simulationResult"
                :is-simulating="isSimulating"
                @scenario-change="onSimulationScenarioChange"
                @speed-change="simulationSpeed = $event"
                @duration-change="simulationDuration = $event"
                @run="runSimulation"
            ></simulation-panel>

            <report-panel
                :current-file="currentFile"
                :stats="stats"
                :detections="detections"
                :advice="safetyAdvice"
                :model-info="modelInfo"
                @export-report="onExportReport"
            ></report-panel>

            <algorithm-flow-panel></algorithm-flow-panel>

            <system-info-panel
                :model-info="modelInfo"
                :health-status="healthStatus"
            ></system-info-panel>

            <dashboard-panel
                :dashboard="dashboard"
            ></dashboard-panel>

            <history-panel
                :history="historyList"
                @download-log="onDownloadLog"
                @clear-history="onClearHistory"
            ></history-panel>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/vue.global.prod.js') }}"></script>
    <script src="{{ url_for('static', filename='js/components.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
