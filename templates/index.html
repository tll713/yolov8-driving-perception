<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自动驾驶目标检测与风险提示系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div id="app">
        <div class="bg-grid"></div>
        <div class="bg-glow bg-glow-1"></div>
        <div class="bg-glow bg-glow-2"></div>

        <app-header
            :health-status="healthStatus"
            :model-info="modelInfo"
            :current-user="currentUser"
        ></app-header>

        <div class="app-layout">
            <nav class="app-sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-title">检测</div>
                    <a class="sidebar-item" :class="{ active: activeTab === 'detect' }" @click="activeTab = 'detect'">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        检测与结果
                    </a>

                </div>
                <div class="sidebar-section">
                    <div class="sidebar-title">分析</div>
                    <a class="sidebar-item" :class="{ active: activeTab === 'risk' }" @click="activeTab = 'risk'">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                        目标风险明细
                    </a>
                    <a class="sidebar-item" :class="{ active: activeTab === 'advice' }" @click="activeTab = 'advice'">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
                        驾驶安全建议
                    </a>
                    <a class="sidebar-item" :class="{ active: activeTab === 'scene' }" @click="activeTab = 'scene'">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                        场景理解
                    </a>
                </div>
                <div class="sidebar-section">
                    <div class="sidebar-title">工具</div>
                    <a class="sidebar-item" :class="{ active: activeTab === 'simulation' }" @click="activeTab = 'simulation'">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        风险仿真
                    </a>
                    <a class="sidebar-item" :class="{ active: activeTab === 'dashboard' }" @click="activeTab = 'dashboard'">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                        数据看板
                    </a>
                    <a class="sidebar-item" :class="{ active: activeTab === 'history' }" @click="activeTab = 'history'">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        历史视频
                    </a>
                </div>
            </nav>

            <main class="app-content">
                <div v-show="activeTab === 'detect'" class="tab-panel">
                    <control-panel
                        :has-file="!!currentFile"
                        :is-detecting="isDetecting"
                        @file-selected="onFileSelected"
                        @detect="onDetect"
                        @clear="onClear"
                    ></control-panel>
                    <display-area
                        :file-preview-url="filePreviewUrl"
                        :file-type="fileType"
                        :detections="detections"
                        :detection-timeline="detectionTimeline"
                        :is-detecting="isDetecting"
                        :show-badge="showBadge"
                        :result-video-url="resultVideoUrl"
                        :result-image-url="resultImageUrl"
                        :lane-analysis="laneAnalysis"
                        :max-risk-level="maxRiskLevel"
                    ></display-area>

                    <stats-grid
                        :confidence="confidence"
                        :total-count="stats.totalCount"
                        :overall-risk="stats.overallRisk"
                        :risk-class="stats.riskClass"
                        :inference-time="stats.inferenceTime"
                        :class-counts="stats.classCounts"
                        :risk-counts="stats.riskCounts"
                        :max-risk-score="stats.maxRiskScore"
                        :inference-mode="stats.inferenceMode"
                        :inference-size="stats.inferenceSize"
                        :refined="stats.refined"
                    ></stats-grid>

                    <lane-insight-panel
                        :lane-analysis="laneAnalysis"
                    ></lane-insight-panel>
                </div>

                <div v-show="activeTab === 'risk'" class="tab-panel">
                    <risk-analysis-panel
                        :detections="detections"
                    ></risk-analysis-panel>
                </div>

                <div v-show="activeTab === 'advice'" class="tab-panel">
                    <safety-advice-panel
                        :advice="safetyAdvice"
                    ></safety-advice-panel>
                </div>

                <div v-show="activeTab === 'scene'" class="tab-panel">
                    <scene-insight-panel
                        :summary="sceneSummary"
                        :trace="decisionTrace"
                    ></scene-insight-panel>
                </div>

                <div v-show="activeTab === 'simulation'" class="tab-panel">
                    <simulation-panel
                        :presets="simulationPresets"
                        :custom-scenarios="simulationCustomScenarios"
                        :weather-options="simulationWeatherOptions"
                        :scenario="simulationScenario"
                        :weather="simulationWeather"
                        :speed="simulationSpeed"
                        :duration="simulationDuration"
                        :result="simulationResult"
                        :comparison-result="simulationComparisonResult"
                        :is-simulating="isSimulating"
                        :is-comparing="isComparingSimulation"
                        @scenario-change="onSimulationScenarioChange"
                        @weather-change="simulationWeather = $event"
                        @speed-change="simulationSpeed = $event"
                        @duration-change="simulationDuration = $event"
                        @run="runSimulation"
                        @compare="compareSimulationAeb"
                        @save-scenario="saveSimulationScenario"
                        @delete-scenario="deleteSimulationScenario"
                    ></simulation-panel>
                </div>

                <div v-show="activeTab === 'dashboard'" class="tab-panel">
                    <dashboard-panel
                        :dashboard="dashboard"
                    ></dashboard-panel>
                </div>

                <div v-show="activeTab === 'history'" class="tab-panel">
                    <history-panel
                        :history="historyList"
                        @download-log="onDownloadLog"
                        @clear-history="onClearHistory"
                    ></history-panel>
                </div>
            </main>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/vue.global.prod.js') }}"></script>
    <script src="{{ url_for('static', filename='js/three.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/DRACOLoader.js') }}"></script>
    <script src="{{ url_for('static', filename='js/GLTFLoader.js') }}"></script>
    <script src="{{ url_for('static', filename='js/components.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
