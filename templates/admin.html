<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 自动驾驶感知与仿真系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .admin-layout {
            display: flex;
            min-height: calc(100vh - 70px);
            position: relative;
            z-index: 1;
        }
        .admin-sidebar {
            width: 200px;
            flex-shrink: 0;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 20px 0;
            backdrop-filter: blur(12px);
            position: sticky;
            top: 70px;
            height: calc(100vh - 70px);
            overflow-y: auto;
        }
        .admin-sidebar-title {
            font-size: 0.68rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 8px 20px 12px;
            font-weight: 600;
        }
        .admin-sidebar-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            font-size: 0.84rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s ease;
            border-left: 2px solid transparent;
        }
        .admin-sidebar-item:hover {
            background: rgba(139,92,246,0.06);
            color: var(--text-primary);
        }
        .admin-sidebar-item.active {
            background: rgba(139,92,246,0.1);
            color: #8b5cf6;
            border-left-color: #8b5cf6;
        }
        .admin-sidebar-item svg {
            flex-shrink: 0;
            opacity: 0.7;
        }
        .admin-sidebar-item.active svg {
            opacity: 1;
        }
        .admin-content {
            flex: 1;
            padding: 28px 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .admin-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .admin-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            backdrop-filter: blur(12px);
        }
        .admin-card:hover {
            border-color: var(--border-hover);
        }
        .admin-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 22px;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.02);
        }
        .admin-card-header-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .admin-card-header h3 {
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .admin-card-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .admin-card-body {
            padding: 22px;
        }

        .confidence-layout {
            display: flex;
            gap: 32px;
            align-items: center;
        }
        .confidence-visual {
            flex-shrink: 0;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid rgba(139,92,246,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(139,92,246,0.04);
            position: relative;
        }
        .confidence-visual::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: #8b5cf6;
            animation: admin-spin 2s linear infinite;
        }
        @keyframes admin-spin {
            to { transform: rotate(360deg); }
        }
        .confidence-visual-value {
            font-size: 2.2rem;
            font-weight: 800;
            color: #8b5cf6;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: -0.03em;
        }
        .confidence-visual-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-top: 2px;
        }
        .confidence-controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .confidence-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(139,92,246,0.15);
            outline: none;
        }
        .confidence-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            cursor: pointer;
            box-shadow: 0 0 12px rgba(139,92,246,0.4);
            transition: transform 0.15s ease;
        }
        .confidence-slider::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }
        .confidence-input-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .confidence-input-row .form-input {
            max-width: 120px;
        }

        .admin-table-wrap {
            overflow-x: auto;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        .admin-table th {
            text-align: left;
            padding: 10px 14px;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.02);
            white-space: nowrap;
        }
        .admin-table td {
            padding: 10px 14px;
            font-size: 0.82rem;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            font-family: 'JetBrains Mono', monospace;
        }
        .admin-table tr:hover td {
            background: rgba(0,0,0,0.02);
        }
        .admin-table tr:last-child td {
            border-bottom: none;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        .status-item {
            background: rgba(0,0,0,0.02);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px 18px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: all 0.2s ease;
        }
        .status-item:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
        }
        .status-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
        }
        .status-val {
            font-size: 1.2rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 700;
        }
        .admin-badge-high { background: rgba(239,68,68,0.12); color: var(--red); }
        .admin-badge-medium { background: rgba(245,158,11,0.12); color: var(--yellow); }
        .admin-badge-low { background: rgba(16,185,129,0.12); color: var(--green); }
        .admin-badge-info { background: rgba(59,130,246,0.12); color: var(--accent); }

        .admin-btn-purple {
            background: linear-gradient(135deg, #8b5cf6, #ec4899) !important;
            box-shadow: 0 2px 12px rgba(139,92,246,0.3);
        }
        .admin-btn-purple:hover:not(:disabled) {
            box-shadow: 0 4px 20px rgba(139,92,246,0.4);
            transform: translateY(-1px);
        }

        .admin-empty {
            text-align: center;
            padding: 40px 0;
            color: var(--text-muted);
            font-size: 0.88rem;
        }

        .admin-log-msg {
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .admin-stat-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 4px;
        }
        .admin-stat-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(0,0,0,0.03);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.78rem;
            color: var(--text-secondary);
        }
        .admin-stat-chip strong {
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
        }
        .admin-form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .admin-form-grid .full {
            grid-column: 1 / -1;
        }
        .admin-user-tools {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .user-status-active { color: var(--green); }
        .user-status-disabled { color: var(--red); }

        .admin-search-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0 10px;
            transition: border-color 0.2s ease;
        }
        .admin-search-bar:focus-within { border-color: var(--accent); }
        .admin-search-bar svg { flex-shrink: 0; color: var(--text-muted); }
        .admin-search-bar .form-input {
            border: none;
            background: transparent;
            padding: 7px 0;
            box-shadow: none;
        }
        .admin-search-bar .form-input:focus { border-color: transparent; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <div class="logo-icon" style="background:linear-gradient(135deg, #8b5cf6, #ec4899);">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </div>
                <div class="logo-text">
                    <h1>管理后台</h1>
                    <span class="logo-sub">自动驾驶感知与仿真系统 · Admin Panel</span>
                </div>
            </div>
            <div class="header-right">
                <div class="user-badge" style="background:rgba(139,92,246,0.1);border-color:rgba(139,92,246,0.2);color:#8b5cf6;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span id="admin-name">管理员</span>
                </div>

                <button class="btn btn-ghost btn-sm" onclick="handleLogout()">退出</button>
            </div>
        </div>
    </header>

    <div class="admin-layout">
        <nav class="admin-sidebar">
            <div class="admin-sidebar-title">系统管理</div>
            <div class="admin-sidebar-item active" onclick="switchTab('confidence', this)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
                置信度阈值
            </div>
            <div class="admin-sidebar-item" onclick="switchTab('records', this)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                检测记录
            </div>
            <div class="admin-sidebar-item" onclick="switchTab('status', this)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                系统状态
            </div>
            <div class="admin-sidebar-item" onclick="switchTab('logs', this)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                错误日志
            </div>
            <div class="admin-sidebar-item" onclick="switchTab('users', this)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                用户管理
            </div>
        </nav>

        <main class="admin-content">
            <!-- 置信度阈值 -->
            <section class="admin-section" id="tab-confidence">
                <div class="admin-card">
                    <div class="admin-card-header">
                        <div class="admin-card-header-left">
                            <h3>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
                                置信度阈值设置
                            </h3>
                            <span class="admin-card-desc">后续所有检测结果将按此阈值过滤，低于阈值的检测目标将被忽略</span>
                        </div>
                    </div>
                    <div class="admin-card-body">
                        <div class="confidence-layout">
                            <div class="confidence-visual">
                                <span class="confidence-visual-value" id="confidence-value">0.50</span>
                                <span class="confidence-visual-label">当前阈值</span>
                            </div>
                            <div class="confidence-controls">
                                <div style="display:flex;justify-content:space-between;font-size:0.75rem;color:var(--text-muted);margin-bottom:-4px;">
                                    <span>0.00</span>
                                    <span>0.50</span>
                                    <span>1.00</span>
                                </div>
                                <input type="range" id="confidence-slider" min="0" max="100" value="50" class="confidence-slider" oninput="onSliderChange(this.value)">
                                <div class="confidence-input-row">
                                    <input type="number" id="confidence-input" class="form-input" min="0" max="1" step="0.01" value="0.50" style="max-width:120px;" oninput="onInputChange(this.value)">
                                    <button class="btn btn-primary btn-sm admin-btn-purple" onclick="saveConfidence()">保存设置</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 检测记录 -->
            <section class="admin-section" id="tab-records" style="display:none;">
                <div class="admin-card">
                    <div class="admin-card-header">
                        <div class="admin-card-header-left">
                            <h3>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                                检测记录管理
                            </h3>
                            <span class="admin-card-desc" id="records-count">共 0 条记录</span>
                        </div>
                        <button class="btn btn-ghost btn-sm" onclick="loadRecords()">刷新</button>
                    </div>
                    <div class="admin-card-body" style="padding:0;">
                        <div class="admin-table-wrap">
                            <table class="admin-table" id="records-table">
                                <thead>
                                    <tr><th>#</th><th>检测时间</th><th>文件名</th><th>目标数</th><th>风险等级</th><th>操作</th></tr>
                                </thead>
                                <tbody id="records-body"></tbody>
                            </table>
                        </div>
                        <div class="admin-empty" id="records-empty" style="display:none;">暂无检测记录</div>
                    </div>
                </div>
            </section>

            <!-- 系统状态 -->
            <section class="admin-section" id="tab-status" style="display:none;">
                <div class="admin-card">
                    <div class="admin-card-header">
                        <div class="admin-card-header-left">
                            <h3>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                                系统运行状态
                            </h3>
                            <span class="admin-card-desc">实时监控服务资源占用与运行状况</span>
                        </div>
                        <button class="btn btn-ghost btn-sm" onclick="loadStatus()">刷新</button>
                    </div>
                    <div class="admin-card-body">
                        <div class="status-grid" id="status-grid"></div>
                    </div>
                </div>
            </section>

            <!-- 错误日志 -->
            <section class="admin-section" id="tab-logs" style="display:none;">
                <div class="admin-card">
                    <div class="admin-card-header">
                        <div class="admin-card-header-left">
                            <h3>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                                错误日志
                            </h3>
                            <span class="admin-card-desc" id="logs-count">共 0 条</span>
                        </div>
                        <button class="btn btn-ghost btn-sm" onclick="loadLogs()">刷新</button>
                    </div>
                    <div class="admin-card-body" style="padding:0;">
                        <div class="admin-table-wrap">
                            <table class="admin-table" id="logs-table">
                                <thead>
                                    <tr><th>ID</th><th>级别</th><th>时间</th><th>信息</th><th>操作</th></tr>
                                </thead>
                                <tbody id="logs-body"></tbody>
                            </table>
                        </div>
                        <div class="admin-empty" id="logs-empty" style="display:none;">当前无错误记录</div>
                    </div>
                </div>
            </section>

            <section class="admin-section" id="tab-users" style="display:none;">
                <div class="admin-card">
                    <div class="admin-card-header">
                        <div class="admin-card-header-left">
                            <h3>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                                用户管理
                            </h3>
                            <span class="admin-card-desc" id="users-count">共 0 名用户</span>
                        </div>
                        <button class="btn btn-ghost btn-sm" type="button" onclick="loadUsers()">刷新</button>
                        <div class="admin-search-bar">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                            <input type="text" id="user-search" class="form-input" placeholder="搜索用户名" oninput="filterUsers()">
                        </div>
                    </div>
                    <div class="admin-card-body">
                        <form onsubmit="return createUser(event)">
                            <div class="admin-form-grid">
                                <input class="form-input" id="new-username" placeholder="用户名">
                                <input class="form-input" id="new-email" placeholder="邮箱">
                                <input class="form-input" id="new-password" type="password" placeholder="初始密码">
                                <select class="form-input" id="new-status">
                                    <option value="active">正常</option>
                                    <option value="disabled">禁用</option>
                                </select>
                                <div class="full">
                                    <button class="btn btn-primary btn-sm admin-btn-purple" type="submit">创建用户</button>
                                </div>
                            </div>
                        </form>
                        <div class="admin-table-wrap">
                            <table class="admin-table" id="users-table">
                                <thead>
                                    <tr><th>#</th><th>用户名</th><th>邮箱</th><th>状态</th><th>创建时间</th><th>操作</th></tr>
                                </thead>
                                <tbody id="users-body"></tbody>
                            </table>
                        </div>
                        <div class="admin-empty" id="users-empty" style="display:none;">暂无用户</div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div class="login-modal-overlay" id="edit-modal" style="display:none;">
        <div class="login-modal-card" style="text-align:left;">
            <div class="login-modal-icon" style="margin:0 auto 16px;">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
            </div>
            <h3 style="text-align:center;">编辑用户</h3>
            <p style="text-align:center;margin-bottom:20px;">用户名：<strong id="edit-username-display"></strong></p>
            <div class="form-group">
                <label class="form-label">邮箱</label>
                <input class="form-input" id="edit-email-input" type="email" placeholder="请输入邮箱">
            </div>
            <div class="form-group" style="margin-top:12px;">
                <label class="form-label">新密码（留空则不修改）</label>
                <input class="form-input" id="edit-password-input" type="password" placeholder="输入新密码">
            </div>
            <div class="login-modal-actions" style="margin-top:24px;">
                <button class="btn btn-primary admin-btn-purple" type="button" onclick="submitEditUser()">保存</button>
                <button class="btn btn-ghost" type="button" onclick="closeEditModal()">取消</button>
            </div>
        </div>
    </div>

    <script>
        var adminUser = localStorage.getItem('adminUser');
        if (!adminUser) { window.location.href = '/login'; }
        else { document.getElementById('admin-name').textContent = adminUser; }

        function handleLogout() {
            localStorage.removeItem('adminUser');
            window.location.href = '/login';
        }

        function switchTab(name, el) {
            document.querySelectorAll('.admin-section').forEach(function(s) { s.style.display = 'none'; });
            document.querySelectorAll('.admin-sidebar-item').forEach(function(t) { t.classList.remove('active'); });
            document.getElementById('tab-' + name).style.display = '';
            if (el) el.classList.add('active');
            if (name === 'records') loadRecords();
            if (name === 'status') loadStatus();
            if (name === 'logs') loadLogs();
            if (name === 'users') loadUsers();
        }

        function loadConfidence() {
            fetch('/api/admin/confidence').then(function(r){return r.json()}).then(function(d){
                if(d.code===0){ updateConfidenceUI(d.data.confidence); }
            });
        }
        function updateConfidenceUI(v) {
            document.getElementById('confidence-value').textContent = v.toFixed(2);
            document.getElementById('confidence-slider').value = Math.round(v * 100);
            document.getElementById('confidence-input').value = v.toFixed(2);
        }
        function onSliderChange(v) {
            var val = (parseInt(v) / 100).toFixed(2);
            document.getElementById('confidence-input').value = val;
            document.getElementById('confidence-value').textContent = val;
        }
        function onInputChange(v) {
            var val = parseFloat(v);
            if (isNaN(val)) return;
            if (val < 0) val = 0; if (val > 1) val = 1;
            document.getElementById('confidence-slider').value = Math.round(val * 100);
            document.getElementById('confidence-value').textContent = val.toFixed(2);
        }
        function saveConfidence() {
            var val = parseFloat(document.getElementById('confidence-input').value);
            if (isNaN(val)) { alert('请输入有效数值'); return; }
            fetch('/api/admin/confidence', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({confidence: val})
            }).then(function(r){return r.json()}).then(function(d){
                if(d.code===0){ updateConfidenceUI(d.data.confidence); alert('阈值已更新为 ' + d.data.confidence); }
                else { alert(d.message || '更新失败'); }
            });
        }

        function riskBadge(level) {
            var map = { high: '高风险', medium: '中风险', info: '交通提示', low: '低风险' };
            return '<span class="admin-badge admin-badge-' + (level || 'low') + '">' + (map[level] || level || '低风险') + '</span>';
        }

        function loadRecords() {
            fetch('/api/admin/records').then(function(r){return r.json()}).then(function(d){
                if(d.code!==0) return;
                var items = d.data.items || [];
                document.getElementById('records-count').textContent = '共 ' + items.length + ' 条记录';
                var tbody = document.getElementById('records-body');
                var empty = document.getElementById('records-empty');
                if (!items.length) { tbody.innerHTML = ''; empty.style.display = ''; return; }
                empty.style.display = 'none';
                tbody.innerHTML = items.map(function(item, i){
                    return '<tr>' +
                        '<td>' + (i+1) + '</td>' +
                        '<td>' + (item.created_at || '-') + '</td>' +
                        '<td>' + (item.original_filename || item.filename || '-') + '</td>' +
                        '<td>' + (item.count || item.total_objects || 0) + '</td>' +
                        '<td>' + riskBadge(item.max_risk_level) + '</td>' +
                        '<td><button class="btn btn-ghost btn-sm" onclick="deleteRecord(' + i + ')">删除</button></td>' +
                    '</tr>';
                }).join('');
            });
        }
        function deleteRecord(id) {
            if (!confirm('确认删除此记录？')) return;
            fetch('/api/admin/records/' + id, {method:'DELETE'}).then(function(r){return r.json()}).then(function(d){
                if(d.code===0) loadRecords(); else alert(d.message||'删除失败');
            });
        }

        function loadStatus() {
            fetch('/api/admin/system-status').then(function(r){return r.json()}).then(function(d){
                if(d.code!==0) return;
                var s = d.data;
                var grid = document.getElementById('status-grid');
                grid.innerHTML = [
                    statusCard('CPU 占用', s.cpu_percent + '%', s.cpu_percent > 80 ? 'high' : 'normal'),
                    statusCard('内存使用', s.memory_percent + '%', s.memory_percent > 80 ? 'high' : 'normal'),
                    statusCard('内存详情', s.memory_used || '-', 'normal'),
                    statusCard('磁盘使用', s.disk_percent + '%', s.disk_percent > 90 ? 'high' : 'normal'),
                    statusCard('磁盘详情', s.disk_used || '-', 'normal'),
                    statusCard('GPU', s.gpu || '-', 'normal'),
                    statusCard('系统平台', s.platform || '-', 'normal'),
                    statusCard('Python 版本', s.python_version || '-', 'normal'),
                    statusCard('运行时间', s.uptime || '-', 'normal'),
                    statusCard('服务状态', s.status === 'running' ? '运行中' : '异常', s.status === 'running' ? 'normal' : 'high'),
                    statusCard('模型状态', s.model_loaded ? '已加载' : '未加载', s.model_loaded ? 'normal' : 'high'),
                    statusCard('检测总数', s.total_detections != null ? s.total_detections : '-', 'normal'),
                ].join('');
            });
        }
        function statusCard(label, value, level) {
            var color = level === 'high' ? 'var(--red)' : 'var(--green)';
            return '<div class="status-item"><span class="status-label">' + label + '</span><span class="status-val" style="color:' + color + '">' + value + '</span></div>';
        }

        function loadLogs() {
            fetch('/api/admin/error-logs').then(function(r){return r.json()}).then(function(d){
                if(d.code!==0) return;
                var items = d.data.items || [];
                document.getElementById('logs-count').textContent = '共 ' + items.length + ' 条';
                var tbody = document.getElementById('logs-body');
                var empty = document.getElementById('logs-empty');
                if (!items.length) { tbody.innerHTML = ''; empty.style.display = ''; return; }
                empty.style.display = 'none';
                tbody.innerHTML = items.map(function(l){
                    var lvlCls = l.level === 'ERROR' ? 'admin-badge-high' : l.level === 'WARN' ? 'admin-badge-medium' : 'admin-badge-info';
                    return '<tr>' +
                        '<td>' + l.id + '</td>' +
                        '<td><span class="admin-badge ' + lvlCls + '">' + l.level + '</span></td>' +
                        '<td>' + (l.created_at || '-') + '</td>' +
                        '<td class="admin-log-msg">' + (l.message || '-') + '</td>' +
                        '<td><button class="btn btn-ghost btn-sm" onclick="deleteLog(' + l.id + ')">删除</button></td>' +
                    '</tr>';
                }).join('');
            });
        }
        function deleteLog(id) {
            fetch('/api/admin/error-logs/' + id, {method:'DELETE'}).then(function(r){return r.json()}).then(function(d){
                if(d.code===0) loadLogs();
            });
        }

        var allUsers = [];

        function renderUsersList(items) {
            var tbody = document.getElementById('users-body');
            var empty = document.getElementById('users-empty');
            if (!items.length) { tbody.innerHTML = ''; empty.style.display = ''; return; }
            empty.style.display = 'none';
            tbody.innerHTML = items.map(function(u, i){
                var status = u.status || 'active';
                return '<tr>' +
                    '<td>' + (i + 1) + '</td>' +
                    '<td>' + (u.username || '-') + '</td>' +
                    '<td>' + (u.email || '-') + '</td>' +
                    '<td><span class="user-status-' + status + '">' + (status === 'disabled' ? '禁用' : '正常') + '</span></td>' +
                    '<td>' + (u.created_at || '-') + '</td>' +
                    '<td><div class="admin-user-tools">' +
                        '<button class="btn btn-ghost btn-sm" type="button" onclick="editUser(' + JSON.stringify(u.username) + ')">编辑</button>' +
                        '<button class="btn btn-ghost btn-sm" type="button" onclick="toggleUserStatus(' + JSON.stringify(u.username) + ', ' + JSON.stringify(status) + ')">' + (status === 'disabled' ? '启用' : '禁用') + '</button>' +
                        '<button class="btn btn-ghost btn-sm" type="button" onclick="deleteUser(' + JSON.stringify(u.username) + ')">删除</button>' +
                    '</div></td>' +
                '</tr>';
            }).join('');
        }

        function apiJson(url, options) {
            return fetch(url, options || {}).then(function(r) {
                return r.json().then(function(data) {
                    if (!r.ok && data.code === 0) data.code = r.status;
                    return data;
                });
            });
        }

        function loadUsers() {
            apiJson('/api/admin/users').then(function(d){
                if(d.code!==0) { alert(d.message || '加载用户失败'); return; }
                allUsers = d.data.items || [];
                document.getElementById('users-count').textContent = '共 ' + allUsers.length + ' 名用户';
                document.getElementById('user-search').value = '';
                renderUsersList(allUsers);
            }).catch(function(){ alert('加载用户失败，请检查后端服务是否启动'); });
        }

        function filterUsers() {
            var keyword = document.getElementById('user-search').value.trim().toLowerCase();
            if (!keyword) { renderUsersList(allUsers); return; }
            var filtered = allUsers.filter(function(u) {
                return (u.username || '').toLowerCase().indexOf(keyword) !== -1;
            });
            renderUsersList(filtered);
        }

        function createUser(e) {
            e.preventDefault();
            var username = document.getElementById('new-username').value.trim();
            var email = document.getElementById('new-email').value.trim();
            var password = document.getElementById('new-password').value;
            var status = document.getElementById('new-status').value;
            if (!username || !email || !password) {
                alert('请填写用户名、邮箱和密码');
                return false;
            }
            apiJson('/api/admin/users', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: username,
                    email: email,
                    password: password,
                    status: status
                })
            }).then(function(d){
                if(d.code===0){
                    document.getElementById('new-username').value = '';
                    document.getElementById('new-email').value = '';
                    document.getElementById('new-password').value = '';
                    document.getElementById('new-status').value = 'active';
                    loadUsers();
                } else {
                    alert(d.message || '创建失败');
                }
            }).catch(function(){ alert('创建失败，请检查后端服务是否启动'); });
            return false;
        }

        var editingUsername = null;

        function editUser(username) {
            var user = allUsers.find(function(u) { return u.username === username; });
            if (!user) { alert('用户数据未加载，请先点击刷新'); return; }
            editingUsername = username;
            document.getElementById('edit-username-display').textContent = username;
            document.getElementById('edit-email-input').value = user.email || '';
            document.getElementById('edit-password-input').value = '';
            document.getElementById('edit-modal').style.display = '';
        }

        function closeEditModal() {
            editingUsername = null;
            document.getElementById('edit-modal').style.display = 'none';
        }

        function submitEditUser() {
            if (!editingUsername) return;
            var email = document.getElementById('edit-email-input').value.trim();
            var password = document.getElementById('edit-password-input').value;
            if (!email) { alert('邮箱不能为空'); return; }
            var body = { email: email };
            if (password) body.password = password;
            apiJson('/api/admin/users/' + encodeURIComponent(editingUsername), {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            }).then(function(d){
                if(d.code===0) { closeEditModal(); loadUsers(); }
                else alert(d.message || '更新失败');
            }).catch(function(){ alert('更新失败，请检查后端服务是否启动'); });
        }

        function toggleUserStatus(username, status) {
            var next = status === 'disabled' ? 'active' : 'disabled';
            apiJson('/api/admin/users/' + encodeURIComponent(username), {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status: next })
            }).then(function(d){
                if(d.code===0) loadUsers(); else alert(d.message || '更新失败');
            }).catch(function(){ alert('更新失败，请检查后端服务是否启动'); });
        }

        function deleteUser(username) {
            if (!confirm('确认删除该用户？')) return;
            apiJson('/api/admin/users/' + encodeURIComponent(username), { method: 'DELETE' }).then(function(d){
                if(d.code===0) loadUsers(); else alert(d.message || '删除失败');
            }).catch(function(){ alert('删除失败，请检查后端服务是否启动'); });
        }

        window.loadUsers = loadUsers;
        window.filterUsers = filterUsers;
        window.createUser = createUser;
        window.editUser = editUser;
        window.closeEditModal = closeEditModal;
        window.submitEditUser = submitEditUser;
        window.toggleUserStatus = toggleUserStatus;
        window.deleteUser = deleteUser;

        loadConfidence();
    </script>
</body>
</html>
