<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 自动驾驶感知与仿真系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 4px;
        }
        .role-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(0,0,0,0.02);
        }
        .role-option:hover { border-color: var(--border-hover); }
        .role-option.active-user {
            border-color: var(--accent);
            background: var(--accent-soft);
        }
        .role-option.active-admin {
            border-color: #8b5cf6;
            background: rgba(139,92,246,0.06);
        }
        .role-option-icon {
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .role-option-icon.user-icon { background: var(--accent-soft); color: var(--accent); }
        .role-option-icon.admin-icon { background: rgba(139,92,246,0.1); color: #8b5cf6; }
        .role-option-text { display: flex; flex-direction: column; gap: 1px; }
        .role-option-title { font-size: 0.88rem; font-weight: 600; color: var(--text-primary); }
        .role-option-desc { font-size: 0.72rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>
                <div>
                    <div class="auth-title">欢迎回来</div>
                    <div class="auth-subtitle">登录自动驾驶感知系统</div>
                </div>
            </div>

            <div id="alert-area"></div>

            <form class="auth-form" id="login-form" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">选择角色</label>
                    <div class="role-selector">
                        <div class="role-option active-user" id="role-user" onclick="selectRole('user')">
                            <div class="role-option-icon user-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            </div>
                            <div class="role-option-text">
                                <span class="role-option-title">普通用户</span>
                                <span class="role-option-desc">图片与视频检测</span>
                            </div>
                        </div>
                        <div class="role-option" id="role-admin" onclick="selectRole('admin')">
                            <div class="role-option-icon admin-icon">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                            </div>
                            <div class="role-option-text">
                                <span class="role-option-title">管理员</span>
                                <span class="role-option-desc">系统管理与配置</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="username">用户名</label>
                    <input class="form-input" type="text" id="username" name="username" placeholder="请输入用户名" required autocomplete="username">
                    <div class="form-error" id="username-error"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <div class="password-toggle">
                        <input class="form-input" type="password" id="password" name="password" placeholder="请输入密码" required autocomplete="current-password">
                        <button type="button" class="password-toggle-btn" onclick="togglePassword('password', this)">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <div class="form-error" id="password-error"></div>
                </div>

                <button class="btn btn-primary auth-btn" type="submit" id="submit-btn">登 录</button>
            </form>

            <div class="auth-footer" id="register-footer">
                还没有账号？<a href="/register" class="form-link">立即注册</a>
            </div>

            <div class="auth-divider">或</div>

            <div style="text-align:center;">
                <a href="/" class="btn btn-ghost btn-sm">返回首页</a>
            </div>
        </div>
    </div>

    <script>
        var selectedRole = 'user';

        function selectRole(role) {
            selectedRole = role;
            var userEl = document.getElementById('role-user');
            var adminEl = document.getElementById('role-admin');
            var footer = document.getElementById('register-footer');
            var btn = document.getElementById('submit-btn');
            userEl.className = 'role-option' + (role === 'user' ? ' active-user' : '');
            adminEl.className = 'role-option' + (role === 'admin' ? ' active-admin' : '');
            footer.style.display = role === 'admin' ? 'none' : '';
            btn.style.background = role === 'admin' ? 'linear-gradient(135deg, #8b5cf6, #ec4899)' : '';
        }

        function togglePassword(inputId, btn) {
            var input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
            } else {
                input.type = 'password';
                btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
            }
        }

        function showAlert(type, message) {
            var area = document.getElementById('alert-area');
            area.innerHTML = '<div class="auth-alert auth-alert-' + type + '">' + message + '</div>';
            setTimeout(function() { area.innerHTML = ''; }, 5000);
        }

        function clearErrors() {
            document.querySelectorAll('.form-error').forEach(function(el) { el.textContent = ''; });
            document.querySelectorAll('.form-input').forEach(function(el) { el.classList.remove('error'); });
        }

        function handleLogin(e) {
            e.preventDefault();
            clearErrors();

            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value;
            var valid = true;

            if (!username) {
                document.getElementById('username-error').textContent = '请输入用户名';
                document.getElementById('username').classList.add('error');
                valid = false;
            }
            if (!password) {
                document.getElementById('password-error').textContent = '请输入密码';
                document.getElementById('password').classList.add('error');
                valid = false;
            }
            if (!valid) return false;

            var btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = '登录中...';

            var api = selectedRole === 'admin' ? '/api/admin/login' : '/api/auth/login';

            fetch(api, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, password: password })
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.code === 0) {
                    if (selectedRole === 'admin') {
                        localStorage.setItem('adminUser', username);
                        showAlert('success', '管理员登录成功，正在跳转...');
                        setTimeout(function() { window.location.href = '/admin'; }, 1000);
                    } else {
                        localStorage.setItem('currentUser', username);
                        showAlert('success', '登录成功，正在跳转...');
                        setTimeout(function() { window.location.href = '/'; }, 1000);
                    }
                } else {
                    showAlert('error', data.message || '登录失败');
                    btn.disabled = false;
                    btn.textContent = '登 录';
                }
            })
            .catch(function() {
                showAlert('error', '网络错误，请检查后端服务是否启动');
                btn.disabled = false;
                btn.textContent = '登 录';
            });

            return false;
        }
    </script>
</body>
</html>
