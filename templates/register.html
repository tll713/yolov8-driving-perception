<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 自动驾驶感知与仿真系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                </div>
                <div>
                    <div class="auth-title">创建账号</div>
                    <div class="auth-subtitle">注册自动驾驶感知系统</div>
                </div>
            </div>

            <div id="alert-area"></div>

            <form class="auth-form" id="register-form" onsubmit="return handleRegister(event)">
                <div class="form-group">
                    <label class="form-label" for="username">用户名</label>
                    <input class="form-input" type="text" id="username" name="username" placeholder="3-20个字符" required autocomplete="username">
                    <div class="form-error" id="username-error"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">邮箱</label>
                    <input class="form-input" type="email" id="email" name="email" placeholder="example@email.com" required autocomplete="email">
                    <div class="form-error" id="email-error"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <div class="password-toggle">
                        <input class="form-input" type="password" id="password" name="password" placeholder="至少6个字符" required autocomplete="new-password">
                        <button type="button" class="password-toggle-btn" onclick="togglePassword('password', this)">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <div class="form-error" id="password-error"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirm-password">确认密码</label>
                    <div class="password-toggle">
                        <input class="form-input" type="password" id="confirm-password" name="confirm_password" placeholder="再次输入密码" required autocomplete="new-password">
                        <button type="button" class="password-toggle-btn" onclick="togglePassword('confirm-password', this)">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <div class="form-error" id="confirm-password-error"></div>
                </div>

                <button class="btn btn-primary auth-btn" type="submit" id="submit-btn">注 册</button>
            </form>

            <div class="auth-footer">
                已有账号？<a href="/login" class="form-link">立即登录</a>
            </div>

        </div>
    </div>

    <script>
        function togglePassword(inputId, btn) {
            var input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
            } else {
                input.type = 'password';
                btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
            }
        }

        function showAlert(type, message) {
            var area = document.getElementById('alert-area');
            area.innerHTML = '<div class="auth-alert auth-alert-' + type + '">' + message + '</div>';
            setTimeout(function() { area.innerHTML = ''; }, 5000);
        }

        function clearErrors() {
            document.querySelectorAll('.form-error').forEach(function(el) { el.textContent = ''; });
            document.querySelectorAll('.form-input').forEach(function(el) { el.classList.remove('error'); });
        }

        function handleRegister(e) {
            e.preventDefault();
            clearErrors();

            var username = document.getElementById('username').value.trim();
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;
            var confirmPassword = document.getElementById('confirm-password').value;
            var valid = true;

            if (!username || username.length < 3 || username.length > 20) {
                document.getElementById('username-error').textContent = '用户名需3-20个字符';
                document.getElementById('username').classList.add('error');
                valid = false;
            }
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                document.getElementById('email-error').textContent = '请输入有效的邮箱地址';
                document.getElementById('email').classList.add('error');
                valid = false;
            }
            if (!password || password.length < 6) {
                document.getElementById('password-error').textContent = '密码至少6个字符';
                document.getElementById('password').classList.add('error');
                valid = false;
            }
            if (password !== confirmPassword) {
                document.getElementById('confirm-password-error').textContent = '两次密码不一致';
                document.getElementById('confirm-password').classList.add('error');
                valid = false;
            }
            if (!valid) return false;

            var btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = '注册中...';

            fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, email: email, password: password })
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.code === 0) {
                    showAlert('success', '注册成功，正在跳转到登录页...');
                    setTimeout(function() { window.location.href = '/login'; }, 1500);
                } else {
                    showAlert('error', data.message || '注册失败');
                    btn.disabled = false;
                    btn.textContent = '注 册';
                }
            })
            .catch(function() {
                showAlert('error', '网络错误，请检查后端服务是否启动');
                btn.disabled = false;
                btn.textContent = '注 册';
            });

            return false;
        }
    </script>
</body>
</html>
